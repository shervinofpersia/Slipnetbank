name: SlipNet Collector

on:
  schedule:
    - cron: '*/30 * * * *'   # هر 30 دقیقه
  workflow_dispatch:          # اجرای دستی از گیت‌هاب

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run SlipNet collector
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html slipnet_db.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update slipnet configs [skip ci]"
          git push
